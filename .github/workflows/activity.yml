name: Refresh profile activity

# Daily, hands-off, runs on GitHub's servers (your computer can be off).
# Rewrites the "Recent Activity" block of the profile README from your public
# GitHub events. Commits ONLY when the content changes — no empty/padding commits.

on:
  schedule:
    - cron: '17 6 * * *'   # ~06:17 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Recent Activity section
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/refresh_activity.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: refresh recent activity"
          git push
